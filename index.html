<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Juris Forca · JurisDuel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', Roboto, sans-serif;
        }

        html, body {
            overflow-x: hidden;
        }

        body {
            background: #fafaf8;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: clamp(10px, 3.5vw, 32px);
            padding-top: max(clamp(10px, 3.5vw, 32px), env(safe-area-inset-top));
            padding-bottom: max(clamp(10px, 3.5vw, 32px), env(safe-area-inset-bottom));
        }

        .container {
            max-width: 600px;
            width: 100%;
            margin: auto 0;
        }

        @media (min-width: 700px) {
            .container { max-width: 720px; }
            h1 { font-size: 1.5rem; }
            .subhead { font-size: 0.95rem; }
            .description-text { font-size: 1.15rem; }
            .word-display { font-size: 1.7rem; }
            .letter-btn { width: 38px; height: 38px; font-size: 0.95rem; }
            .btn { font-size: 0.95rem; padding: 11px 24px; }
            .input-group input { font-size: 1rem; padding: 11px 18px; }
            .pill { font-size: 0.85rem; }
        }

        @media (max-width: 480px) {
            body { align-items: flex-start; }
        }

        header {
            margin-bottom: 14px;
            text-align: center;
        }

        h1 {
            font-size: clamp(1.05rem, 4vw, 1.25rem);
            font-weight: 600;
            color: #1a1a1f;
            margin-bottom: 2px;
        }

        .subhead {
            color: #9a9a9a;
            font-size: clamp(0.72rem, 2.8vw, 0.82rem);
        }

        .box {
            background: #ffffff;
            border: 1px solid #e8e5de;
            border-radius: 18px;
            padding: clamp(14px, 4vw, 18px) clamp(12px, 4vw, 20px);
            margin-bottom: 14px;
        }

        .arrow-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid #e2e0da;
            background: transparent;
            color: #8a8a8a;
            cursor: pointer;
            transition: 0.15s;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .arrow-btn svg {
            width: 15px;
            height: 15px;
        }

        .arrow-btn:hover:not(:disabled) {
            border-color: #2c2c3a;
            color: #2c2c3a;
        }

        .arrow-btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        .block-nav-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .block-info-group {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px clamp(8px, 3vw, 14px);
            flex: 1;
        }

        .row-divider {
            width: 1px;
            height: 20px;
            background: #e8e5de;
            margin: 0 2px;
        }

        .block-label {
            font-size: clamp(0.75rem, 3vw, 0.85rem);
            font-weight: 600;
            letter-spacing: 0.3px;
            color: #2c2c3a;
            min-width: 70px;
            text-align: center;
        }

        .pill {
            font-size: clamp(0.7rem, 2.8vw, 0.78rem);
            color: #6a6a6a;
            background: #f4f2ec;
            padding: 4px 12px;
            border-radius: 20px;
            white-space: nowrap;
        }

        #questionBox {
            position: relative;
            padding-top: clamp(52px, 12vw, 64px);
        }

        .hearts-display {
            position: absolute;
            top: clamp(10px, 3vw, 14px);
            left: clamp(12px, 4vw, 20px);
            display: flex;
            gap: 3px;
            font-size: 0.72rem;
            margin-bottom: 0;
        }

        .heart {
            transition: 0.3s;
            opacity: 0.85;
        }

        .heart.lost {
            opacity: 0.15;
        }

        :root {
            --q-font-scale: 1;
        }

        .description-text {
            text-align: center;
            font-size: calc(clamp(0.88rem, 3.6vw, 1rem) * var(--q-font-scale));
            color: #2e2e3a;
            line-height: 1.5;
            margin: 0 auto clamp(16px, 5vw, 24px);
            max-width: 460px;
            transition: font-size 0.15s;
        }

        .font-toggle-btn {
            position: absolute;
            top: clamp(8px, 2.5vw, 12px);
            right: clamp(10px, 3vw, 16px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            width: 34px;
            height: 34px;
            border-radius: 10px;
            border: 1px solid #e2e0da;
            background: #fbfaf7;
            color: #2e2e3a;
            font-weight: 600;
            font-size: 0.7rem;
            line-height: 1;
            cursor: pointer;
            transition: 0.15s;
            -webkit-tap-highlight-color: transparent;
        }

        .font-toggle-btn:hover {
            border-color: #2c2c3a;
        }

        .font-toggle-btn:active {
            transform: scale(0.95);
        }

        .font-toggle-dots {
            display: flex;
            gap: 2px;
        }

        .font-toggle-dots span {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #e2e0da;
            transition: 0.15s;
        }

        .font-toggle-dots span.active {
            background: #2c2c3a;
        }

        .word-display {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: clamp(6px, 3vw, 12px) clamp(10px, 4vw, 20px);
            font-size: clamp(1rem, 5vw, 1.4rem);
            font-weight: 500;
            padding: 0 0 clamp(14px, 5vw, 22px);
            font-family: 'Courier New', monospace;
            color: #1a1a1f;
        }

        .word-group {
            display: inline-flex;
            align-items: center;
            gap: 2px;
        }

        .word-group.revealed {
            color: #2b7a4b;
            font-weight: 600;
        }

        .word-group.hidden {
            color: #1a1a1f;
        }

        .word-display .letter-slot {
            display: inline-block;
            min-width: 22px;
            text-align: center;
            border-bottom: 2px solid #d8d4cc;
            margin: 0 1px;
            transition: 0.2s;
            padding: 0 2px;
        }

        .word-display .letter-slot.filled {
            border-bottom-color: #2c2c3a;
            color: #2c2c3a;
        }

        .word-display .space-slot {
            display: inline-block;
            min-width: 16px;
        }

        .letter-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: clamp(5px, 1.6vw, 6px);
            margin-bottom: 20px;
        }

        .letter-btn {
            width: clamp(28px, 8vw, 32px);
            height: clamp(28px, 8vw, 32px);
            border-radius: 8px;
            border: 1px solid #e2e0da;
            background: transparent;
            font-weight: 500;
            font-size: clamp(0.72rem, 3vw, 0.82rem);
            color: #2e2e3a;
            cursor: pointer;
            transition: 0.12s;
            -webkit-tap-highlight-color: transparent;
        }

        .letter-btn:hover:not(:disabled) {
            border-color: #2c2c3a;
        }

        .letter-btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        .letter-btn.correct {
            background: #2b7a4b20;
            border-color: #2b7a4b;
            color: #2b7a4b;
        }

        .letter-btn.wrong {
            background: #b34a4a20;
            border-color: #b34a4a;
            color: #b34a4a;
        }

        .input-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 18px;
        }

        .input-group input {
            flex: 1 1 180px;
            min-width: 0;
            max-width: 300px;
            padding: 10px 16px;
            border: 1px solid #e2e0da;
            border-radius: 30px;
            font-size: clamp(0.82rem, 3.2vw, 0.88rem);
            background: transparent;
            outline: none;
            transition: 0.2s;
            color: #1a1a1f;
            text-transform: uppercase;
        }

        .input-group input:focus {
            border-color: #2c2c3a;
        }

        .input-group input:disabled {
            opacity: 0.4;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 500;
            font-size: clamp(0.8rem, 3.2vw, 0.85rem);
            cursor: pointer;
            transition: 0.15s;
            border: 1px solid #2c2c3a;
            background: #2c2c3a;
            color: white;
            white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:hover:not(:disabled) {
            opacity: 0.85;
        }

        .btn:disabled {
            opacity: 0.25;
            cursor: not-allowed;
        }

        .btn-success {
            background: #2b7a4b;
            border-color: #2b7a4b;
        }

        .btn-warning {
            background: #b68b5c;
            border-color: #b68b5c;
        }

        .btn-danger {
            background: #b34a4a;
            border-color: #b34a4a;
        }

        .term-nav {
            display: flex;
            justify-content: center;
            gap: 32px;
        }

        #resultPanel {
            min-height: 0;
        }

        #resultPanel.has-content {
            background: #ffffff;
            border: 1px solid #e8e5de;
            border-radius: 18px;
            padding: 16px 20px;
            margin-bottom: 14px;
            text-align: center;
        }

        .correct {
            font-weight: 600;
            color: #1d6f42;
            font-size: 1rem;
        }

        .wrong {
            font-weight: 600;
            color: #b34a4a;
            font-size: 1rem;
        }

        .term-display {
            font-weight: 600;
            font-size: 0.95rem;
            color: #1a1a1f;
            text-transform: uppercase;
        }

        .explanation {
            margin: 10px auto 0;
            max-width: 460px;
            color: #5a5a68;
            line-height: 1.55;
            font-size: 0.88rem;
        }

        .self-eval {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 16px 0 4px;
        }

        .self-eval .btn {
            font-size: 0.78rem;
            padding: 7px 15px;
        }

        .eval-hint {
            margin-top: 8px;
            font-weight: 500;
            font-size: 0.82rem;
            color: #8a8a8a;
        }

        .block-complete {
            text-align: center;
            font-size: 1.05rem;
            font-weight: 600;
            color: #1a1a1f;
            margin-bottom: 6px;
        }

        .block-complete-sub {
            text-align: center;
            color: #6a6a6a;
            font-size: 0.88rem;
            line-height: 1.5;
        }

        @media (max-width: 600px) {
            header { margin-bottom: 10px; }
            h1 { font-size: 1.15rem; }
            .box { margin-bottom: 10px; }
            .description-text { font-size: calc(1rem * var(--q-font-scale)); margin-bottom: 14px; }
            .word-display { font-size: 1.5rem; gap: 8px 14px; padding-bottom: 16px; }
            .word-display .letter-slot { min-width: 20px; }
            .letter-grid { gap: 7px; margin-bottom: 16px; }
            .letter-btn { width: 38px; height: 38px; font-size: 0.95rem; border-radius: 10px; }
            .input-group input { padding: 11px 16px; font-size: 0.95rem; }
            .btn { padding: 11px 22px; font-size: 0.92rem; }
            .arrow-btn { width: 42px; height: 42px; }
            .arrow-btn svg { width: 17px; height: 17px; }
            .pill { font-size: 0.75rem; padding: 5px 12px; }
            .explanation { font-size: 0.92rem; }
        }

        @media (max-width: 380px) {
            body { padding: 8px; }
            .box { padding: 12px 10px; border-radius: 14px; }
            #questionBox { padding-top: 54px; }
            .font-toggle-btn { width: 30px; height: 30px; }
            .block-nav-row { gap: 8px; }
            .block-label { min-width: 55px; }
            .term-nav { gap: 24px; }
            .input-group { gap: 6px; }
            .input-group input { flex-basis: 130px; }
            .self-eval .btn { flex: 1 1 auto; }
            .letter-btn { width: 34px; height: 34px; font-size: 0.85rem; }
            .word-display { font-size: 1.3rem; }
        }

        @media (max-width: 340px) {
            .letter-grid { gap: 5px; }
            .letter-btn { width: 30px; height: 30px; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <header>
        <h1>Juris Forca</h1>
        <div class="subhead">Direito Penal · Princípios e fundamentos</div>
    </header>

    <div class="box">
        <div class="block-nav-row">
            <button class="arrow-btn" id="prevBlockBtn" aria-label="Bloco anterior">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </button>
            <div class="block-info-group">
                <span class="block-label" id="blockLabel">Bloco 1/4</span>
                <span class="row-divider"></span>
                <span class="pill" id="posPill">🧩 1/8</span>
                <span class="pill" id="masteredPill">🎯 0/8 dominados</span>
            </div>
            <button class="arrow-btn" id="nextBlockBtn" aria-label="Próximo bloco">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </button>
        </div>
    </div>

    <div class="box" id="questionBox">
        <button class="font-toggle-btn" id="fontToggleBtn" aria-label="Ajustar tamanho do texto">
            Aa
            <span class="font-toggle-dots" id="fontToggleDots">
                <span></span><span></span><span></span><span></span>
            </span>
        </button>

        <div class="hearts-display" id="heartsDisplay"></div>

        <div class="description-text" id="descriptionText">Carregando...</div>

        <div class="word-display" id="wordDisplay"></div>

        <div class="letter-grid" id="letterGrid"></div>

        <div class="input-group">
            <input type="text" id="answerInput" placeholder="Digite a palavra que falta..." autocomplete="off">
            <button class="btn" id="submitWordBtn">Tentar</button>
        </div>

        <div class="term-nav">
            <button class="arrow-btn" id="prevTermBtn" aria-label="Termo anterior">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </button>
            <button class="arrow-btn" id="nextTermBtn" aria-label="Próximo termo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </button>
        </div>
    </div>

    <div id="resultPanel">
        <div id="resultContent"></div>
    </div>
</div>

<script>
    // ------------------------------------------------------------
    // DADOS
    // ------------------------------------------------------------
    const CONCEITOS_RAW = [
  { 
    termo: "Princípio da [OCULTAR]Legalidade (Nullum crimen sine praevia lege)", 
    descricao: "Não há crime sem lei anterior que o defina, nem pena sem prévia cominação legal.", 
    explicacao: "Previsto no art. 5°, XXXIX da CF/88 e art. 1° do CP, este princípio é a base do Direito Penal. Garante a segurança jurídica ao permitir que o cidadão saiba previamente quais condutas são criminosas. Divide-se em dois subprincípios: Reserva Legal e Anterioridade. A violação a este princípio gera a inconstitucionalidade da norma. É uma garantia individual contra o arbítrio estatal, impedindo a punição por fatos que, no momento da prática, não eram considerados crimes. As bancas frequentemente cobram a diferença entre este princípio e a irretroatividade da lei penal, sendo que a exceção é a retroatividade benéfica ao réu." 
  },
  { 
    termo: "Princípio da [OCULTAR]Reserva Legal", 
    descricao: "Somente lei em sentido estrito (ordinária) pode definir crimes e cominar penas.", 
    explicacao: "Decorre do princípio da legalidade. Impede que Medidas Provisórias, Decretos ou outros atos normativos criem crimes ou estabeleçam sanções penais. O STF admite MP em matéria penal, desde que para beneficiar o réu. Este princípio também veda a edição de leis vagas (princípio da taxatividade), que não descrevem com clareza a conduta proibida, pois isso compromete a segurança jurídica. Exemplo: lei que criminalize 'condutas atentatórias aos bons costumes' seria inconstitucional por violar a reserva legal, pois o termo é vago e impreciso. Em provas, é comum a confusão com a legalidade em sentido amplo; a reserva legal exige lei formal (ato do Legislativo)." 
  },
  { 
    termo: "Normas Penais em [OCULTAR]Branco", 
    descricao: "Normas que dependem de complementação por outra norma para serem plenamente aplicáveis.", 
    explicacao: "Exemplo típico é a Lei de Drogas, que menciona 'substância entorpecente' sem definir quais são, necessitando de portarias da ANVISA para complementação. Não violam o princípio da reserva legal, pois o núcleo do tipo penal (conduta proibida) está descrito na lei. Dividem-se em homogêneas (complementação por fonte homóloga, ex: outro decreto do Executivo) e heterogêneas (complementação por fonte heteróloga, ex: portaria de outro órgão). A doutrina majoritária entende que são constitucionais, pois a complementação não cria nova conduta criminosa, apenas especifica elementos do tipo. Em concursos, a banca pode questionar se a norma penal em branco viola a reserva legal; a resposta é não, desde que a complementação não amplie o tipo penal." 
  },
  { 
    termo: "[OCULTAR]Analogia in malam partem", 
    descricao: "Proibição de usar a analogia para criar condutas criminosas ou agravar a situação do réu.", 
    explicacao: "A analogia é método de integração da lei quando há lacuna. No Direito Penal, é vedada quando prejudicial ao acusado, pois viola o princípio da reserva legal (não há crime sem lei anterior). Exemplo: não se pode punir uma conduta semelhante a um crime, mas não prevista em lei, utilizando analogia. Já a analogia in bonam partem (benéfica) é permitida, pois beneficia o réu, como a aplicação de uma causa de diminuição de pena prevista para caso semelhante. As bancas adoram confundir analogia com interpretação extensiva; na interpretação extensiva, o juiz extrai a vontade da lei que disse menos do que queria (ex: lei diz 'veículo', mas inclui bicicleta?), enquanto na analogia há lacuna (sem norma para o caso)." 
  },
  { 
    termo: "[OCULTAR]Interpretação Extensiva", 
    descricao: "Possibilidade de ampliar o sentido da lei para abranger situações que ela pretendia alcançar.", 
    explicacao: "No Direito Penal, a interpretação extensiva é admitida, mesmo que prejudicial ao réu, pois o intérprete apenas extrai a vontade da lei, que se expressou de forma restritiva. Exemplo: a lei fala em 'veículo automotor' para o crime de furto, mas a intenção era incluir também 'bicicleta'? Não, pois o termo é técnico. Na extensiva, a lei disse menos do que queria: se a norma proíbe 'entrar em estabelecimento comercial', mas a intenção era proibir 'ingressar' de qualquer forma, a interpretação extensiva pode abranger 'pular o muro' se a intenção da lei for clara. É diferente da analogia, pois aqui há norma sobre o caso, apenas com texto lacônico. O STF admite a interpretação extensiva mesmo contra o réu, desde que não viole a taxatividade." 
  },
  { 
    termo: "Princípio da [OCULTAR]Anterioridade da Lei Penal", 
    descricao: "A lei penal deve ser anterior ao fato para ser aplicada, salvo se for benéfica ao réu.", 
    explicacao: "Decorre do princípio da legalidade (art. 5°, XXXIX CF). A lei penal só pode ser aplicada a fatos ocorridos após sua entrada em vigor, ou seja, não pode retroagir para prejudicar o acusado. Isso garante que o cidadão saiba antecipadamente o que é crime. A exceção é a retroatividade benéfica: a nova lei pode retroagir para alcançar fatos anteriores se for mais favorável ao réu (art. 5°, XL CF e art. 2°, § único CP). Exemplo: se a pena de um crime for reduzida após a prática do fato, a nova lei se aplica ao crime anterior. Isso inclui também a aplicação a sentenças transitadas em julgado. Em provas, é comum perguntarem se a lei penal pode retroagir; a regra é não, exceto para beneficiar." 
  },
  { 
    termo: "[OCULTAR]Irretroatividade da Lei Penal", 
    descricao: "A lei penal não se aplica a fatos praticados antes de sua entrada em vigor.", 
    explicacao: "Decorre do princípio da anterioridade e visa proteger a segurança jurídica. O cidadão só pode ser punido por condutas que já eram crimes no momento da prática. A lei penal não retroage, salvo exceção constitucional: a lei penal benéfica ao réu (art. 5°, XL CF). A irretroatividade é a regra, e a retroatividade benéfica é a exceção. Exemplo: se uma lei nova aumenta a pena de um crime, ela não se aplica a crimes praticados antes de sua vigência. Já se a lei nova diminui a pena, retroage para beneficiar. É importante saber que a lei penal benéfica se aplica inclusive a processos em andamento e a sentenças condenatórias com trânsito em julgado. Em concursos, a banca pode confundir com a irretroatividade da lei civil, que tem regras diferentes." 
  },
  { 
    termo: "Princípio da [OCULTAR]Individualização da Pena", 
    descricao: "A pena deve ser personalizada em três fases: legislativa, judicial e executiva.", 
    explicacao: "Previsto no art. 5°, XLVI da CF, este princípio garante que a pena seja adequada a cada caso concreto, considerando as circunstâncias do crime e a personalidade do agente. Na fase legislativa, a lei comina penas mínimas e máximas proporcionais à gravidade do crime. Na fase judicial, o juiz, com base nos critérios do art. 59 do CP, fixa a pena dentro dos limites legais, analisando culpabilidade, antecedentes, conduta social, motivos, circunstâncias e consequências. Na fase executiva, o juiz da execução penal decide sobre progressão de regime, livramento condicional, etc., conforme o comportamento do apenado. A individualização é uma garantia contra penas padronizadas, assegurando que a pena cumpra seu papel ressocializador e preventivo. É comum a cobrança sobre as três fases, especialmente a diferença entre a individualização judicial (art. 59 CP) e a execução penal." 
  },
  { 
    termo: "Princípio da [OCULTAR]Intranscendência da Pena", 
    descricao: "A pena não passa da pessoa do condenado, mas a obrigação de reparar o dano pode ser estendida aos sucessores.", 
    explicacao: "Previsto no art. 5°, XLV da CF, este princípio veda que a pena atinja terceiros, ou seja, somente o infrator pode ser punido. Se o condenado morre, a punibilidade fica extinta, e seus herdeiros não podem sofrer a pena criminal. Contudo, a obrigação de reparar o dano civil e o perdimento de bens podem ser executados contra os sucessores, até o limite do patrimônio transferido. Exemplo: se o condenado deve R$ 100 mil de indenização e deixa R$ 500 mil em bens, os herdeiros devem pagar a indenização até esse limite. Atenção: a multa é espécie de pena e, portanto, NÃO pode ser cobrada dos herdeiros, pois não é indenização à vítima. A multa se extingue com a morte do condenado. As bancas costumam perguntar se a multa pode ser cobrada dos herdeiros; a resposta é não."

  { 
    termo: "Princípio da [OCULTAR]Humanidade", 
    descricao: "Proíbe penas de morte (exceto em guerra), perpétuas, trabalhos forçados, banimento e cruéis.", 
    explicacao: "Previsto no art. 5°, XLVII da CF, este princípio veda penas desumanas ou degradantes. A pena de morte é admitida apenas em caso de guerra declarada (art. 84, XIX CF), para crimes militares. A prisão perpétua é proibida, e qualquer burla, como pena mínima de 60 anos, é inconstitucional (princípio da proporcionalidade). Trabalhos forçados são vedados, mas o trabalho do preso é permitido como forma de ressocialização. O banimento (expulsão do território nacional) também é proibido. Penas cruéis são inaceitáveis, como castigos corporais. Essas vedações são cláusulas pétreas (art. 60, §4°, CF), não podendo ser abolidas por emenda constitucional. Em provas, é frequente a confusão sobre a pena de morte e a possibilidade de prisão perpétua em tratados internacionais; no Brasil, são vedadas." 
  },
  { 
    termo: "Princípio da [OCULTAR]Presunção de Inocência", 
    descricao: "Ninguém é considerado culpado até o trânsito em julgado de sentença penal condenatória.", 
    explicacao: "Previsto no art. 5°, LVII da CF, é um dos pilares do Estado Democrático de Direito. Significa que, durante todo o processo, o réu deve ser tratado como inocente, com o ônus da prova cabendo ao acusador. Duas dimensões: interna (tratamento no processo) e externa (tratamento fora do processo). A regra probatória é o in dubio pro reo: se houver dúvida, decide-se em favor do réu. A prisão cautelar é válida se fundamentada em risco para o processo (ex: fuga), e não como antecipação de pena. O STF já relativizou o princípio (permitindo execução provisória após 2ª instância), mas retomou o entendimento clássico no julgamento das ADCs 43, 44 e 54: a execução da pena só é possível após o trânsito em julgado. Súmula 444 do STJ: inquéritos e ações penais em curso não podem ser usados como maus antecedentes, pois violam a presunção de inocência." 
  },
  { 
    termo: "Princípio da [OCULTAR]Ofensividade", 
    descricao: "O fato, para ser crime, deve ofender de maneira grave um bem jurídico relevante.", 
    explicacao: "Não basta a conduta estar prevista em lei (tipicidade formal); é necessário que ela cause lesão ou risco de lesão a um bem jurídico relevante (tipicidade material). Exemplo: uma lei que criminalizasse 'cuspir na rua' seria inconstitucional por ofensividade, pois a conduta não ofende significativamente nenhum bem jurídico. Este princípio atua como filtro material, excluindo condutas de bagatela ou que não gerem dano relevante. É fundamental para a compreensão do princípio da insignificância, pois este se baseia na ausência de ofensividade relevante. Em concursos, é usado para questionar a tipicidade material de condutas formalmente típicas." 
  },
  { 
    termo: "Princípio da [OCULTAR]Alteridade", 
    descricao: "O Direito Penal não pune a autolesão, pois o crime exige lesão a bem jurídico de terceiro.", 
    explicacao: "Decorre da ofensividade. O Direito Penal protege bens jurídicos alheios, não a própria pessoa. Assim, não se pune quem destrói seu próprio patrimônio (art. 163, CP - dano, exige coisa alheia) ou quem se lesiona fisicamente (lesão corporal exige ofensa à integridade corporal de outrem, art. 129, CP). Isso não significa que a autolesão seja sempre permitida (ex: autolesão para fraudar seguro pode ser crime de estelionato), mas que a mera lesão a si mesmo não é crime. A alteridade é um limite material ao Direito Penal, impedindo a criminalização de condutas que não afetam terceiros. É comum a cobrança em crimes como lesão corporal e dano, onde a vítima deve ser diversa do agente." 
  },
  { 
    termo: "Princípio da [OCULTAR]Adequação Social", 
    descricao: "Condutas socialmente aceitas não são consideradas crimes, mesmo quando tipificadas em lei.", 
    explicacao: "Este princípio sustenta que, se uma conduta é tolerada socialmente, não há tipicidade material, ainda que formalmente seja crime. Exemplo: o 'jogo do bicho' é formalmente crime de contravenção, mas há quem defenda a atipicidade material por adequação social. Outro exemplo: 'furto famélico' (furtar alimento para saciar a fome) é considerado atípico por adequação social. É um princípio discutível na doutrina, mas utilizado para excluir a tipicidade de condutas que, embora previstas como crimes, são aceitas pela sociedade. As bancas podem cobrar a diferença entre adequação social e insignificância: a adequação social analisa a aceitação social da conduta, enquanto a insignificância foca na lesão jurídica." 
  },
  { 
    termo: "Princípio da [OCULTAR]Fragmentariedade", 
    descricao: "O Direito Penal só protege bens jurídicos extremamente relevantes, deixando outros para outros ramos.", 
    explicacao: "O Direito Penal não protege todos os bens jurídicos, apenas os mais importantes para a sociedade (vida, liberdade, propriedade etc.). Assim, condutas que violam bens de menor relevo são tratadas por outros ramos (ex: danos morais no cível). A fragmentariedade justifica a seleção de condutas criminosas: nem todo ilícito é crime. Exemplo: uma dívida de aluguel é ilícito civil, não penal. Este princípio está relacionado ao caráter subsidiário do Direito Penal. Em provas, é cobrado como um dos fundamentos para a intervenção mínima. A banca pode perguntar sobre a relação com a subsidiariedade: ambos são aspectos da ultima ratio." 
  },
  { 
    termo: "Princípio da [OCULTAR]Subsidiariedade", 
    descricao: "O Direito Penal deve ser utilizado apenas quando outros ramos do Direito forem insuficientes.", 
    explicacao: "O controle social é feito por diversos ramos (moral, costumes, administrativo, civil etc.). O Direito Penal é o último recurso (ultima ratio) para proteger bens jurídicos, só sendo acionado quando os demais ramos não conseguirem tutelar o bem de forma satisfatória. Exemplo: um dano patrimonial pode ser reparado no cível; só se torna crime se houver fraude ou violência. A subsidiariedade é decorrência da fragmentariedade e visa evitar a criminalização excessiva. As bancas costumam cobrar a relação entre subsidiariedade e intervenção mínima, sendo que a subsidiariedade é uma das faces da intervenção mínima, ao lado da fragmentariedade." 
  },
  { 
    termo: "Princípio da [OCULTAR]Intervenção Mínima", 
    descricao: "O Direito Penal só deve intervir quando absolutamente necessário à proteção de bens jurídicos.", 
    explicacao: "É o princípio-síntese que decorre do caráter fragmentário e subsidiário do Direito Penal. Limita o poder punitivo estatal, estabelecendo que a criminalização só é legítima quando for o meio mais adequado e necessário para proteger bens jurídicos indispensáveis à coexistência social. Exemplo: não se deve criminalizar condutas que podem ser controladas por outros meios. Este princípio é um dos mais cobrados em concursos, especialmente para argumentar contra o endurecimento penal desnecessário. A banca pode perguntar: 'O princípio da intervenção mínima é sinônimo de fragmentariedade?' Resposta: não, são conceitos distintos mas complementares." 
  },
  { 
    termo: "Princípio do [OCULTAR]Ne Bis In Idem", 
    descricao: "Ninguém pode ser punido ou processado duas vezes pelo mesmo fato.", 
    explicacao: "Veda a dupla punição pelo mesmo fato, bem como a dupla persecução penal (processo). Se o réu foi absolvido com trânsito em julgado, não pode ser processado novamente, mesmo que surjam novas provas. Além disso, veda a dupla valoração de uma mesma circunstância para fins de pena. Exemplo: o motivo torpe no homicídio (qualificadora, art. 121, §2°, I CP) não pode ser usado também como agravante genérica (art. 61, II, 'a' CP), sob pena de bis in idem. A vedação se aplica tanto à aplicação da pena (dosimetria) quanto à execução penal. As bancas costumam cobrar o ne bis in idem na dosimetria da pena, especialmente com a reincidência e os maus antecedentes." 
  },
  { 
    termo: "Princípio da [OCULTAR]Proporcionalidade", 
    descricao: "As penas devem ser cominadas e aplicadas de forma proporcional à gravidade do fato.", 
    explicacao: "A pena deve ser proporcional ao crime, tanto na previsão legal (cominação) quanto na aplicação judicial. Se o homicídio tivesse pena menor que o furto, haveria violação. A proporcionalidade atua em três dimensões: adequação (a pena deve ser idônea para atingir a finalidade), necessidade (não pode haver meio menos gravoso) e proporcionalidade em sentido estrito (a gravidade da pena deve corresponder à gravidade do crime). Na dosimetria, o juiz deve observar a proporcionalidade, especialmente na fixação da pena-base (art. 59 CP) e na aplicação das circunstâncias atenuantes e agravantes. As bancas cobram a proporcionalidade na análise das penas alternativas e na vedação de penas cruéis." 
  },
  { 
    termo: "Princípio da [OCULTAR]Confiança", 
    descricao: "Todos têm o direito de agir acreditando que os demais respeitarão as normas sociais.", 
    explicacao: "É um princípio menos citado, mas relevante para o Direito Penal, especialmente nos crimes culposos. Exemplo: o motorista que atravessa o sinal verde confia que os outros motoristas respeitarão o sinal vermelho; se há uma colisão, a culpa não é daquele que confiou, mas de quem violou a norma. A confiança é um limite à responsabilidade penal, pois o agente não pode ser punido por prever um comportamento ilícito de terceiro, a menos que a situação exigisse cautela extra (ex: proximidade de uma escola). É usado para excluir a tipicidade ou a culpabilidade em casos de acidentes. Em provas, é cobrado como uma exceção à teoria da imputação objetiva." 
  },
  { 
    termo: "Princípio da [OCULTAR]Insignificância", 
    descricao: "Condutas de mínima ofensividade não são materialmente típicas, excluindo a tipicidade penal.", 
    explicacao: "Aplica-se a crimes de reduzido potencial ofensivo, em que o valor do bem jurídico é ínfimo (até 10% do salário mínimo, segundo STJ). Requisitos: mínima ofensividade, ausência de periculosidade social, reduzido grau de reprovabilidade e inexpressividade da lesão. Exemplo: furto de um desodorante de R$ 12,00. Não se aplica a crimes como tráfico, roubo, crimes contra a administração pública, etc. A existência de reincidência pode afastar a insignificância, mas o STJ admite excepcionalmente. Aplica-se a outros delitos patrimoniais e, em tese, a outros bens, desde que presentes os requisitos. A consequência é a atipicidade material, com absolvição do réu. Em provas, é cobrada a diferença para a bagatela imprópria e os limites de valor." 
  },
  { 
    termo: "Princípio da [OCULTAR]Bagatela Imprópria", 
    descricao: "Mesmo com o crime consumado, a pena pode ser afastada se for desnecessária no caso concreto.", 
    explicacao: "Diferente da insignificância (que exclui a tipicidade material), na bagatela imprópria o crime existe (típico, ilícito e culpável), mas o juiz deixa de aplicar a pena por considerá-la desnecessária. É uma causa supralegal de extinção da punibilidade, baseada no art. 59 do CP, que permite ao juiz aplicar a pena conforme seja 'necessário e suficiente para reprovação e prevenção do crime'. Exemplo: José furta o celular da colega, mas devolve, repara o dano e faz as pazes; a pena seria desnecessária. É um princípio sem previsão expressa, mas aceito pela doutrina. As bancas cobram a distinção: na insignificância, a conduta é atípica; na bagatela imprópria, a conduta é típica, mas a pena é dispensada." 
  },
  { 
    termo: "Fontes do Direito Penal - [OCULTAR]Materiais", 
    descricao: "Órgãos responsáveis pela criação das normas penais: União (art. 22, CF).", 
    explicacao: "A fonte material (substancial) é o ente que produz o Direito Penal. No Brasil, a União tem competência privativa para legislar sobre Direito Penal (art. 22, I, CF). Excepcionalmente, a União pode autorizar os estados-membros a legislar sobre questões específicas, por lei complementar (art. 22, parágrafo único, CF), se for de interesse estritamente local. A fonte material é o órgão estatal que detém o poder de criar normas penais, ou seja, o Poder Legislativo federal. As bancas cobram essa competência, lembrando que Estados e Municípios NÃO podem criar crimes. A autorização para legislação local é exceção, mas é cobrada." 
  },
  { 
    termo: "Fontes do Direito Penal - Formais [OCULTAR]Imediatas", 
    descricao: "A lei em sentido estrito é a única fonte formal imediata do Direito Penal no Brasil.", 
    explicacao: "Fonte formal imediata é o meio direto de exteriorização do Direito Penal. No Brasil, é a lei ordinária federal (ato do Poder Legislativo). Medidas Provisórias, decretos, resoluções, etc., NÃO são fontes formais imediatas do Direito Penal, pois violam a reserva legal, salvo se beneficiarem o réu. A lei penal deve ser emanada do Congresso Nacional, com processo legislativo regular. A doutrina classifica a lei como fonte imediata porque é a única que pode criar crimes e penas. As bancas confundem com as fontes mediatas (costumes, princípios gerais), que não criam crimes, apenas auxiliam na interpretação. É importante saber que a lei complementar também pode tratar de matéria penal, mas é restrita." 
  },
  { 
    termo: "Fontes do Direito Penal - Formais [OCULTAR]Mediatas", 
    descricao: "Costumes, atos administrativos e princípios gerais do Direito auxiliam na formação do Direito Penal.", 
    explicacao: "São fontes secundárias, que não criam diretamente normas penais, mas contribuem para sua interpretação e integração. Os costumes podem ser usados para interpretar a lei penal (ex: o que é 'bons costumes'?). Os atos administrativos complementam normas penais em branco (ex: portarias da ANVISA sobre drogas). Os princípios gerais do Direito (ex: proporcionalidade, razoabilidade) são guias para a aplicação da lei. Diferente da fonte imediata (lei), as fontes mediatas não podem criar crimes nem penas, mas são essenciais para a compreensão do sistema penal. As bancas cobram a função dos costumes no Direito Penal, lembrando que não podem criar tipos penais." 
  },
  { 
    termo: "[OCULTAR]Imprescritibilidade", 
    descricao: "Crimes de racismo e ação de grupos armados contra a ordem constitucional não prescrevem.", 
    explicacao: "Prevista no art. 5°, XLII e XLIV, CF. A imprescritibilidade é a impossibilidade de o Estado perder o direito de punir pelo decurso do tempo. Aplica-se apenas ao crime de racismo (art. 5°, XLII) e à ação de grupos armados, civis ou militares, contra a ordem constitucional e o Estado Democrático (art. 5°, XLIV). Não se aplica à tortura, tráfico de drogas, terrorismo e crimes hediondos, que são apenas inafiançáveis e insuscetíveis de graça e anistia. A imprescritibilidade é exceção, pois a regra é a prescrição. As bancas cobram os crimes imprescritíveis e os diferenciam dos inafiançáveis." 
  },
  { 
    termo: "[OCULTAR]Inafiançabilidade", 
    descricao: "Crimes como racismo, tortura, tráfico, terrorismo e hediondos são inafiançáveis.", 
    explicacao: "Prevista no art. 5°, XLII e XLIV, CF, e no art. 5°, XLIII, para tortura, tráfico de drogas e terrorismo. A inafiançabilidade impede a concessão de fiança, mas não veda a liberdade provisória sem fiança, com outras medidas cautelares. Aplica-se a: racismo, ação de grupos armados, tortura, tráfico de drogas, terrorismo e crimes hediondos. A fiança é um mecanismo de liberdade provisória; a inafiançabilidade significa que o agente não pode obter a liberdade mediante pagamento em dinheiro. A banca pode perguntar se um crime hediondo admite liberdade provisória; a resposta é sim, desde que sem fiança e com outras cautelares." 
  },
  { 
    termo: "Vedação de [OCULTAR]Graça e Anistia", 
    descricao: "Crimes de tortura, terrorismo, tráfico e hediondos não podem ser objeto de graça ou anistia.", 
    explicacao: "Prevista no art. 5°, XLIII, CF. A graça (individual) e a anistia (coletiva) são formas de extinção da punibilidade (art. 107, CP). Para esses crimes, a CF veda a concessão de tais benefícios. Aplica-se a: tortura, terrorismo, tráfico de drogas ilícitas e crimes hediondos. Não se aplica ao racismo e à ação de grupos armados, que são imprescritíveis. A vedação não impede a comutação de pena (redução), que é diferente da graça. Em provas, a banca pode perguntar se o crime de racismo admite graça: a resposta é não, pois é imprescritível, mas atenção: a vedação de graça/anistia é para a tríplice TTH (Tortura, Terrorismo, Tráfico e Hediondos)." 
  },
  { 
    termo: "[OCULTAR]Menoridade Penal", 
    descricao: "Menores de 18 anos são inimputáveis, não respondendo criminalmente, mas sujeitos ao ECA.",

  },
    {
    termo: "Teoria da [OCULTAR]Norma Penal",
    descricao: "Dispositivo legal que trata de matéria criminal, tipificando condutas e estabelecendo sanções.",
    explicacao: "A norma penal é o dispositivo legal que trata de matéria criminal, podendo tipificar condutas, estabelecer sanções, permitir condutas, regulamentar a pena e seu cumprimento, ou esclarecer conceitos jurídico-penais. É importante destacar que nem toda norma penal é incriminadora, ou seja, nem toda norma penal irá tipificar condutas criminosas ou estabelecer sanções penais. O candidato deve atentar para as classificações: normas incriminadoras, que tipificam condutas e estabelecem sanções, e normas não incriminadoras, que se dividem em permissivas (autorizam comportamentos) e explicativas (esclarecem conceitos). Exemplo de norma incriminadora: art. 121 do CP; exemplo de norma permissiva: art. 23 do CP; exemplo de norma explicativa: art. 327 do CP."
  },
  {

    explicacao: "As normas incriminadoras são aquelas que descrevem condutas proibidas e cominam penas para quem as pratica. Elas representam a essência do Direito Penal, pois definem o que é crime e qual a punição aplicável. Exemplo clássico é o art. 121 do Código Penal, que tipifica o homicídio e estabelece a pena de reclusão de 6 a 20 anos. O candidato deve observar que a norma incriminadora é composta por dois elementos principais: o tipo penal (descrição da conduta) e a cominação da pena (sanção aplicável)."
  },
  {

    explicacao: "As normas não incriminadoras são aquelas que não descrevem crimes nem cominam penas. Elas se dividem em permissivas, que autorizam expressamente determinadas condutas (como o art. 23 do CP, que elenca as causas de exclusão da ilicitude), e explicativas ou complementares, que esclarecem conceitos jurídico-penais relevantes para facilitar a aplicação de outras normas (como o art. 327 do CP, que define funcionário público para fins penais). É fundamental compreender que a norma penal não se resume à norma incriminadora, pois existem várias disposições penais que não criminalizam condutas, mas são igualmente importantes para o sistema jurídico-penal."
  },
  {
    termo: "Normas [OCULTAR]Permissivas",
    descricao: "Normas que autorizam expressamente a prática de determinado comportamento.",
    explicacao: "As normas permissivas são aquelas que, em vez de proibir, autorizam a prática de determinada conduta, afastando a antijuridicidade do fato. Elas atuam como causas de exclusão da ilicitude, previstas no art. 23 do Código Penal: estado de necessidade, legítima defesa, estrito cumprimento de dever legal e exercício regular de direito. É importante entender que estas normas não tornam a conduta lícita, mas sim a excluem do conceito de crime, pois o agente age amparado por uma permissão legal."
  },
  {

  },
  {
    termo: "Princípio da [OCULTAR]Continuidade das Leis",
    descricao: "As leis se sucedem no tempo, pois é da natureza humana a mudança de pensamento.",
    explicacao: "O princípio da continuidade das leis estabelece que a substituição de normas é um fenômeno natural no tempo, pois a sociedade e o legislador evoluem em suas concepções. Quando uma lei revoga a outra, a lei revogadora deve abordar a matéria de forma, ao menos um pouco, diferente do modo como tratava a lei revogada, caso contrário seria absolutamente inútil. Este princípio é fundamental para compreendermos a dinâmica da produção legislativa e a sucessão das leis penais no tempo."
  },
  {
    termo: "[OCULTAR]Revogação",
    descricao: "Substituição de uma norma jurídica por outra, total ou parcialmente.",
    explicacao: "A revogação é o fenômeno pelo qual uma norma jurídica deixa de produzir efeitos, sendo substituída por outra. Pode ser total (ab-rogação), quando toda a lei anterior é substituída, ou parcial (derrogação), quando apenas parte da lei é revogada. Também pode ser expressa, quando a lei nova declara expressamente a revogação, ou tácita, quando a lei nova trata da mesma matéria de forma diferente sem mencionar a revogação da lei antiga. É importante observar que a lei produz efeitos desde sua vigência até sua revogação, o que nos leva ao princípio da atividade da lei."
  },
  {

    descricao: "Revogação total de uma lei.",
    explicacao: "A ab-rogação é a espécie de revogação que atinge a totalidade da lei anterior, substituindo-a integralmente por uma nova lei. Ocorre quando a lei nova trata de toda a matéria da lei antiga, de modo que esta perde completamente sua vigência e eficácia. Exemplo: quando um novo Código Penal é editado e revoga integralmente o código anterior. O candidato deve diferenciar ab-rogação de derrogação (revogação parcial)."
  },
  {
    termo: "[OCULTAR]Derrogação",
    descricao: "Revogação parcial de uma lei.",
    explicacao: "A derrogação é a espécie de revogação que atinge apenas parte da lei anterior, mantendo-se vigentes as demais disposições. Ocorre quando a lei nova trata de parte da matéria da lei antiga, revogando apenas os dispositivos que com ela conflitam, e deixando os demais intactos. Exemplo: quando uma lei altera apenas um artigo específico do Código Penal, revogando parcialmente a redação anterior. O candidato deve entender que a derrogação mantém a vigência da lei antiga no que não foi expressamente revogado ou por ela contrariado."

    // ------------------------------------------------------------
    // ALGORITMO DE DISTRIBUIÇÃO
    // ------------------------------------------------------------
    function distribuirBlocos(conceitos, tamanhoIdeal = 10) {
        const total = conceitos.length;
        if (total <= tamanhoIdeal) return [conceitos.slice()];
        let qtdBlocos = Math.ceil(total / tamanhoIdeal);
        let base = Math.floor(total / qtdBlocos);
        let resto = total % qtdBlocos;
        const blocos = [];
        let inicio = 0;
        for (let i = 0; i < qtdBlocos; i++) {
            let adicional = (i < resto) ? 1 : 0;
            let tamanho = base + adicional;
            if (i === qtdBlocos - 1) tamanho = total - inicio;
            blocos.push(conceitos.slice(inicio, inicio + tamanho));
            inicio += tamanho;
        }
        return blocos;
    }
    
    
    // ------------------------------------------------------------
    // FUNÇÃO PARA EXTRAIR A PALAVRA OCULTA DO TERMO
    // ------------------------------------------------------------
    function extrairPalavraOculta(termo) {
        // Busca o padrão [OCULTAR]palavra
        const match = termo.match(/\[OCULTAR\](\S+)/);
        if (match) {
            return match[1];
        }
        // Fallback: usa a palavra mais longa
        const palavras = termo.split(' ');
        let maior = '';
        for (const p of palavras) {
            if (p.length > maior.length) maior = p;
        }
        return maior;
    }

    function removerMarcaOcultar(termo) {
        return termo.replace(/\[OCULTAR\]/g, '');
    }

    // ------------------------------------------------------------
    // NORMALIZAÇÃO DE TEXTO
    // ------------------------------------------------------------
    function normalizarTexto(texto) {
        return texto
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .replace(/[^a-zA-Z0-9\s]/g, '')
            .toLowerCase()
            .trim();
    }

    function compararTermos(resposta, termoCorreto) {
        return normalizarTexto(resposta) === normalizarTexto(termoCorreto);
    }

    // ------------------------------------------------------------
    // TRATAMENTO DE LETRAS ACENTUADAS
    // ------------------------------------------------------------
    function normalizarLetra(letra) {
        return letra
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .toUpperCase();
    }

    function letrasCorrespondentes(letra) {
        const mapa = {
            'A': ['A', 'Á', 'À', 'Ã', 'Â', 'Ä'],
            'E': ['E', 'É', 'È', 'Ê', 'Ë'],
            'I': ['I', 'Í', 'Ì', 'Î', 'Ï'],
            'O': ['O', 'Ó', 'Ò', 'Õ', 'Ô', 'Ö'],
            'U': ['U', 'Ú', 'Ù', 'Û', 'Ü'],
            'C': ['C', 'Ç']
        };
        const chave = normalizarLetra(letra);
        return mapa[chave] || [letra.toUpperCase()];
    }

    // ------------------------------------------------------------
    // FUNÇÃO PRINCIPAL: OMITE A PALAVRA MARCADA
    // ------------------------------------------------------------
    function renderizarPalavraComOmissaoInteligente(termo, letrasUsadas, termoRevelado) {
        // Remove a marcação para exibição
        const termoLimpo = removerMarcaOcultar(termo);
        const palavras = termoLimpo.split(' ');
        const palavraOculta = extrairPalavraOculta(termo);
        
        // Encontra o índice da palavra oculta
        let indiceOculto = -1;
        for (let i = 0; i < palavras.length; i++) {
            // Remove pontuação para comparação
            const pLimpa = palavras[i].replace(/[^a-zA-ZÀ-ÿ]/g, '');
            if (pLimpa.toLowerCase() === palavraOculta.toLowerCase()) {
                indiceOculto = i;
                break;
            }
        }
        
        // Se não encontrou, usa a mais longa (fallback)
        if (indiceOculto === -1) {
            let maior = 0;
            for (let i = 0; i < palavras.length; i++) {
                if (palavras[i].length > palavras[maior].length) maior = i;
            }
            indiceOculto = maior;
        }
        
        let html = '';
        palavras.forEach((palavra, idx) => {
            const isOculta = (idx === indiceOculto);
            
            if (isOculta) {
                // Palavra oculta
                html += `<span class="word-group hidden">`;
                for (let i = 0; i < palavra.length; i++) {
                    const letra = palavra[i];
                    // Verifica se é caractere especial (pontuação)
                    if (!/[a-zA-ZÀ-ÿ]/.test(letra)) {
                        html += `<span class="letter-slot filled" style="border-bottom-color: transparent; color: #2c2c3a;">${letra}</span>`;
                        continue;
                    }
                    
                    let revelada = false;
                    if (termoRevelado) {
                        revelada = true;
                    } else {
                        for (const usada of letrasUsadas) {
                            const variacoes = letrasCorrespondentes(usada);
                            if (variacoes.includes(letra.toUpperCase())) {
                                revelada = true;
                                break;
                            }
                        }
                    }
                    
                    const classe = revelada ? 'letter-slot filled' : 'letter-slot';
                    const conteudo = revelada ? letra.toUpperCase() : '_';
                    html += `<span class="${classe}">${conteudo}</span>`;
                }
                html += `</span>`;
            } else {
                // Palavra revelada
                html += `<span class="word-group revealed">`;
                for (let i = 0; i < palavra.length; i++) {
                    const letra = palavra[i];
                    html += `<span class="letter-slot filled" style="border-bottom-color: #2b7a4b; color: #2b7a4b;">${letra.toUpperCase()}</span>`;
                }
                html += `</span>`;
            }
            
            if (idx < palavras.length - 1) {
                html += `<span class="space-slot"></span>`;
            }
        });

        return html;
    }

    // ------------------------------------------------------------
    // ESTADO
    // ------------------------------------------------------------
    const blocos = distribuirBlocos(CONCEITOS_RAW, 10);
    const estadoBlocos = blocos.map(() => null);
    let blocoAtual = 0;
    let filaAtual = [];
    let indiceFila = 0;
    let dominadosCount = 0;
    let termoAtual = null;
    let letrasUsadas = new Set();
    let errosFeitos = 0;
    const MAX_ERROS = 3;
    let jogoFinalizado = false;
    let aguardandoAutoavaliacao = false;
    let termoRevelado = false;
    let tentativaPalavraUsada = false;
    let letrasErradas = new Set();
    let palavraOcultaAtual = '';

    // DOM
    const descriptionText = document.getElementById('descriptionText');
    const wordDisplay = document.getElementById('wordDisplay');
    const heartsDisplay = document.getElementById('heartsDisplay');
    const letterGrid = document.getElementById('letterGrid');
    const answerInput = document.getElementById('answerInput');
    const submitWordBtn = document.getElementById('submitWordBtn');
    const resultPanel = document.getElementById('resultPanel');
    const resultContent = document.getElementById('resultContent');
    const posPill = document.getElementById('posPill');
    const masteredPill = document.getElementById('masteredPill');
    const blockLabel = document.getElementById('blockLabel');
    const prevBlockBtn = document.getElementById('prevBlockBtn');
    const nextBlockBtn = document.getElementById('nextBlockBtn');
    const prevTermBtn = document.getElementById('prevTermBtn');
    const nextTermBtn = document.getElementById('nextTermBtn');

    function setResultado(html) {
        resultContent.innerHTML = html;
        if (html && html.trim()) {
            resultPanel.classList.add('has-content');
        } else {
            resultPanel.classList.remove('has-content');
        }
    }

    // ------------------------------------------------------------
    // NAVEGAÇÃO ENTRE BLOCOS
    // ------------------------------------------------------------
    function criarEstadoBloco(i) {
        return {
            fila: blocos[i].map(c => ({ ...c })),
            indice: 0,
            dominados: 0,
            finalizado: false
        };
    }

    function salvarEstadoAtual() {
        estadoBlocos[blocoAtual] = {
            fila: filaAtual,
            indice: indiceFila,
            dominados: dominadosCount,
            finalizado: jogoFinalizado
        };
    }

    function carregarBloco(i) {
        if (i < 0 || i >= blocos.length) return;
        if (estadoBlocos[blocoAtual]) salvarEstadoAtual();

        blocoAtual = i;
        if (!estadoBlocos[i]) estadoBlocos[i] = criarEstadoBloco(i);
        const estado = estadoBlocos[i];

        filaAtual = estado.fila;
        indiceFila = estado.indice;
        dominadosCount = estado.dominados;
        jogoFinalizado = estado.finalizado;
        aguardandoAutoavaliacao = false;
        termoRevelado = false;

        blockLabel.textContent = `Bloco ${blocoAtual + 1}/${blocos.length}`;

        if (jogoFinalizado || filaAtual.length === 0) {
            mostrarBlocoConcluido();
        } else {
            if (indiceFila >= filaAtual.length) indiceFila = filaAtual.length - 1;
            carregarTermo(filaAtual[indiceFila]);
        }
        atualizarProgresso();
    }

    function navegarBloco(direcao) {
        carregarBloco(blocoAtual + direcao);
    }

    function atualizarNavegacaoBloco() {
        prevBlockBtn.disabled = blocoAtual === 0;
        nextBlockBtn.disabled = blocoAtual === blocos.length - 1;
    }

    // ------------------------------------------------------------
    // FUNÇÕES PRINCIPAIS
    // ------------------------------------------------------------
    function carregarTermo(item) {
        termoAtual = item;
        termoRevelado = false;
        aguardandoAutoavaliacao = false;
        letrasUsadas = new Set();
        letrasErradas = new Set();
        errosFeitos = 0;
        tentativaPalavraUsada = false;

        // PALAVRA OCULTA: extrai da marcação [OCULTAR]
        palavraOcultaAtual = extrairPalavraOculta(item.termo);

        // Descrição usa o termo sem a marcação
        descriptionText.textContent = item.descricao;
        
        answerInput.value = '';
        answerInput.disabled = false;
        submitWordBtn.disabled = false;
        answerInput.placeholder = 'Digite a palavra que falta...';

        renderizarPalavra();
        renderizarLetras();
        renderizarCoracoes();
        setResultado('');
        habilitarInput(true);
        atualizarProgresso();
    }

    function renderizarPalavra() {
        if (!termoAtual) return;
        const html = renderizarPalavraComOmissaoInteligente(
            termoAtual.termo,
            letrasUsadas,
            termoRevelado
        );
        wordDisplay.innerHTML = html;
    }

    function renderizarCoracoes() {
        let html = '';
        for (let i = 0; i < MAX_ERROS; i++) {
            const perdido = i < errosFeitos;
            html += `<span class="heart ${perdido ? 'lost' : ''}">${perdido ? '🖤' : '❤️'}</span>`;
        }
        heartsDisplay.innerHTML = html;
    }

    function renderizarLetras() {
        const letras = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
        letterGrid.innerHTML = '';
        letras.forEach(letra => {
            const btn = document.createElement('button');
            btn.className = 'letter-btn';
            btn.textContent = letra;
            
            let usada = false;
            for (const usadaLetra of letrasUsadas) {
                const variacoes = letrasCorrespondentes(usadaLetra);
                if (variacoes.includes(letra)) {
                    usada = true;
                    break;
                }
            }
            
            let isWrong = false;
            for (const errada of letrasErradas) {
                const variacoes = letrasCorrespondentes(errada);
                if (variacoes.includes(letra)) {
                    isWrong = true;
                    break;
                }
            }
            
            if (isWrong && !usada) {
                btn.classList.add('wrong');
            }
            
            const disabled = usada || jogoFinalizado || aguardandoAutoavaliacao || termoRevelado;
            btn.disabled = disabled;
            btn.addEventListener('click', () => tentarLetra(letra));
            letterGrid.appendChild(btn);
        });
    }

    function tentarLetra(letra) {
        if (aguardandoAutoavaliacao || jogoFinalizado || termoRevelado) return;
        
        // Verifica se a letra já foi usada
        for (const usada of letrasUsadas) {
            const variacoes = letrasCorrespondentes(usada);
            if (variacoes.includes(letra.toUpperCase())) return;
        }
        
        // Verifica se a letra está ERRADA (não existe na palavra oculta)
        let existe = false;
        for (const char of palavraOcultaAtual) {
            const variacoes = letrasCorrespondentes(letra);
            if (variacoes.includes(char.toUpperCase())) {
                existe = true;
                break;
            }
        }
        
        if (!existe) {
            letrasErradas.add(letra.toUpperCase());
            errosFeitos++;
            renderizarCoracoes();
            renderizarLetras();
            
            if (errosFeitos >= MAX_ERROS) {
                termoRevelado = true;
                renderizarPalavra();
                mostrarResultado(false);
            }
            return;
        }
        
        // Letra existe - adiciona às usadas
        letrasUsadas.add(letra.toUpperCase());
        
        // Verifica se a palavra oculta foi completamente revelada
        let todasReveladas = true;
        for (const char of palavraOcultaAtual) {
            let encontrado = false;
            for (const usada of letrasUsadas) {
                const variacoes = letrasCorrespondentes(usada);
                if (variacoes.includes(char.toUpperCase())) {
                    encontrado = true;
                    break;
                }
            }
            if (!encontrado) {
                todasReveladas = false;
                break;
            }
        }
        
        renderizarPalavra();
        renderizarLetras();
        
        if (todasReveladas) {
            termoRevelado = true;
            mostrarResultado(true);
        }
    }

    function tentarPalavraCompleta() {
        if (aguardandoAutoavaliacao || jogoFinalizado || termoRevelado) return;
        if (tentativaPalavraUsada) {
            setResultado(`<span style="color: #b68b5c;">⚠️ Você já usou sua tentativa para este termo.</span>`);
            return;
        }
        
        const resposta = answerInput.value.trim();
        if (!resposta) {
            setResultado(`<span style="color: #b34a4a;">⚠️ Digite a palavra que falta.</span>`);
            return;
        }
        
        tentativaPalavraUsada = true;

        if (compararTermos(resposta, palavraOcultaAtual)) {
            termoRevelado = true;
            for (let char of palavraOcultaAtual) {
                if (char !== ' ') {
                    const normalizado = normalizarLetra(char);
                    letrasUsadas.add(normalizado);
                }
            }
            renderizarPalavra();
            renderizarLetras();
            mostrarResultado(true);
        } else {
            termoRevelado = true;
            for (let char of palavraOcultaAtual) {
                if (char !== ' ') {
                    const normalizado = normalizarLetra(char);
                    letrasUsadas.add(normalizado);
                }
            }
            renderizarPalavra();
            renderizarLetras();
            
            const termoExibicao = removerMarcaOcultar(termoAtual.termo);
            setResultado(`
                <span style="color: #b34a4a;">❌ Palavra incorreta!</span>
                <div style="margin-top:4px;"><span class="term-display">${termoExibicao.toUpperCase()}</span></div>
                <div class="explanation">${termoAtual.explicacao}</div>
                <div class="eval-hint">Como você avalia?</div>
                <div class="self-eval">
                    <button class="btn btn-success" data-eval="domino">🟢 Domino</button>
                    <button class="btn btn-warning" data-eval="maisomenos">🟡 Mais ou menos</button>
                    <button class="btn btn-danger" data-eval="naodomino">🔴 Não domino</button>
                </div>
            `);
            document.querySelectorAll('[data-eval]').forEach(btn => {
                btn.addEventListener('click', (e) => processarAutoavaliacao(e.target.dataset.eval));
            });
            answerInput.disabled = true;
            submitWordBtn.disabled = true;
            habilitarInput(false);
            renderizarLetras();
            aguardandoAutoavaliacao = true;
        }
    }

    function mostrarResultado(acertou) {
        aguardandoAutoavaliacao = true;
        const termoExibicao = removerMarcaOcultar(termoAtual.termo);
        const explicacao = termoAtual.explicacao;
        const emoji = acertou ? '✅' : '❌';
        const status = acertou ? 'Acertou!' : 'Errou!';
        const statusClass = acertou ? 'correct' : 'wrong';

        // Revela todas as letras da palavra oculta
        for (let char of palavraOcultaAtual) {
            if (char !== ' ') {
                const normalizado = normalizarLetra(char);
                letrasUsadas.add(normalizado);
            }
        }
        renderizarPalavra();
        renderizarLetras();

        setResultado(`
            <div>
                <div><span class="${statusClass}">${emoji} ${status}</span> <span class="term-display">${termoExibicao.toUpperCase()}</span></div>
                <div class="explanation">${explicacao}</div>
                <div class="eval-hint">Como você avalia?</div>
                <div class="self-eval">
                    <button class="btn btn-success" data-eval="domino">🟢 Domino</button>
                    <button class="btn btn-warning" data-eval="maisomenos">🟡 Mais ou menos</button>
                    <button class="btn btn-danger" data-eval="naodomino">🔴 Não domino</button>
                </div>
            </div>
        `);
        document.querySelectorAll('[data-eval]').forEach(btn => {
            btn.addEventListener('click', (e) => processarAutoavaliacao(e.target.dataset.eval));
        });
        answerInput.disabled = true;
        submitWordBtn.disabled = true;
        habilitarInput(false);
        renderizarLetras();
    }

    function processarAutoavaliacao(avaliacao) {
        if (!aguardandoAutoavaliacao || !termoAtual) return;
        aguardandoAutoavaliacao = false;
        const item = termoAtual;
        const idx = filaAtual.findIndex(c => c.termo === item.termo);
        if (idx === -1) return;

        filaAtual.splice(idx, 1);

        if (avaliacao === 'domino') {
            dominadosCount++;
            if (indiceFila >= filaAtual.length) indiceFila = Math.max(0, filaAtual.length - 1);
        } else {
            filaAtual.push(item);
            if (indiceFila >= filaAtual.length) indiceFila = Math.max(0, filaAtual.length - 1);
        }

        if (filaAtual.length === 0) {
            finalizarBloco();
            return;
        }
        if (indiceFila >= filaAtual.length) indiceFila = filaAtual.length - 1;
        if (indiceFila < 0) indiceFila = 0;
        carregarTermo(filaAtual[indiceFila]);
        habilitarInput(true);
    }

    function finalizarBloco() {
        jogoFinalizado = true;
        atualizarProgresso();
        mostrarBlocoConcluido();
    }

    function mostrarBlocoConcluido() {
        const totalBloco = blocos[blocoAtual].length;
        descriptionText.textContent = '';
        wordDisplay.innerHTML = '';
        letterGrid.innerHTML = '';
        heartsDisplay.innerHTML = '';
        answerInput.disabled = true;
        submitWordBtn.disabled = true;
        prevTermBtn.disabled = true;
        nextTermBtn.disabled = true;
        const ultimoBloco = blocoAtual === blocos.length - 1;
        setResultado(`
            <div class="block-complete">🏆 Bloco concluído!</div>
            <div class="block-complete-sub">
                Todos os ${totalBloco} conceitos deste bloco foram dominados.
                ${ultimoBloco ? '<br>Você concluiu todos os blocos! 🎉' : '<br>Use a seta à direita para seguir para o próximo bloco.'}
            </div>
        `);
    }

    function habilitarInput(habilitado) {
        const enabled = habilitado && !jogoFinalizado && !aguardandoAutoavaliacao && !termoRevelado;
        if (enabled && !tentativaPalavraUsada) {
            answerInput.disabled = false;
            submitWordBtn.disabled = false;
        } else {
            answerInput.disabled = true;
            submitWordBtn.disabled = true;
        }
    }

    function navegarTermo(direcao) {
        if (jogoFinalizado || filaAtual.length === 0) return;
        if (aguardandoAutoavaliacao) return;
        const novoIndice = indiceFila + direcao;
        if (novoIndice < 0 || novoIndice >= filaAtual.length) return;
        indiceFila = novoIndice;
        carregarTermo(filaAtual[indiceFila]);
    }

    function atualizarProgresso() {
        const totalBloco = blocos[blocoAtual].length;
        if (!jogoFinalizado && filaAtual.length > 0) {
            posPill.textContent = `🧩 ${indiceFila + 1}/${filaAtual.length}`;
            prevTermBtn.disabled = indiceFila === 0;
            nextTermBtn.disabled = indiceFila >= filaAtual.length - 1;
        } else {
            posPill.textContent = `🧩 ${totalBloco}/${totalBloco}`;
            prevTermBtn.disabled = true;
            nextTermBtn.disabled = true;
        }
        masteredPill.textContent = `🎯 ${dominadosCount}/${totalBloco} dominados`;
        atualizarNavegacaoBloco();
    }

    // ------------------------------------------------------------
    // EVENTOS
    // ------------------------------------------------------------
    document.addEventListener('keydown', (e) => {
        if (e.target === answerInput) return;
        const key = e.key.toUpperCase();
        if (key.length === 1 && key >= 'A' && key <= 'Z') {
            e.preventDefault();
            tentarLetra(key);
        }
        if (e.key === 'ArrowLeft') { e.preventDefault(); navegarTermo(-1); }
        if (e.key === 'ArrowRight') { e.preventDefault(); navegarTermo(1); }
    });

    submitWordBtn.addEventListener('click', tentarPalavraCompleta);
    answerInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); tentarPalavraCompleta(); }
    });

    prevTermBtn.addEventListener('click', () => navegarTermo(-1));
    nextTermBtn.addEventListener('click', () => navegarTermo(1));
    prevBlockBtn.addEventListener('click', () => navegarBloco(-1));
    nextBlockBtn.addEventListener('click', () => navegarBloco(1));

    // ------------------------------------------------------------
    // CONTROLE DE TAMANHO DE FONTE DA PERGUNTA
    // ------------------------------------------------------------
    (function() {
        const escalas = [1, 1.2, 1.4, 1.6];
        const chaveArmazenamento = 'forcaCarrossel_fontScaleIndex';
        let indiceEscala = parseInt(localStorage.getItem(chaveArmazenamento), 10);
        if (isNaN(indiceEscala) || indiceEscala < 0 || indiceEscala >= escalas.length) {
            indiceEscala = 0;
        }

        const fontToggleBtn = document.getElementById('fontToggleBtn');
        const dots = document.querySelectorAll('#fontToggleDots span');

        function aplicarEscala() {
            document.documentElement.style.setProperty('--q-font-scale', escalas[indiceEscala]);
            localStorage.setItem(chaveArmazenamento, indiceEscala);
            dots.forEach((dot, i) => dot.classList.toggle('active', i <= indiceEscala));
        }

        fontToggleBtn.addEventListener('click', () => {
            indiceEscala = (indiceEscala + 1) % escalas.length;
            aplicarEscala();
        });

        aplicarEscala();
    })();

    carregarBloco(0);
</script>
</body>
</html>
